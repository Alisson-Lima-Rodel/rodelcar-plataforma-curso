services:
  # O banco agora é o Supabase (Postgres gerenciado). Não há mais serviço `db`
  # local — o backend conecta via DATABASE_URL (definida no .env), com TLS.
  backend:
    build: ./backend
    environment:
      # Supabase: postgresql+asyncpg://rodelcar_app:SENHA@db.<ref>.supabase.co:5432/postgres
      DATABASE_URL: ${DATABASE_URL:?defina DATABASE_URL no .env (conexão do Supabase)}
      DATABASE_SSL: ${DATABASE_SSL:-}
      # Pool de conexões. (POOL_SIZE+MAX_OVERFLOW) × WEB_CONCURRENCY tem que caber
      # no teto do pooler Supabase em modo sessão (15 clientes) — senão EMAXCONNSESSION.
      DB_POOL_SIZE: ${DB_POOL_SIZE:-5}
      DB_MAX_OVERFLOW: ${DB_MAX_OVERFLOW:-5}
      DB_POOL_RECYCLE: ${DB_POOL_RECYCLE:-1800}
      DB_POOL_TIMEOUT: ${DB_POOL_TIMEOUT:-30}
      # true = loga TODO SQL (debug). Default off: ligado, inunda o terminal.
      SQL_ECHO: ${SQL_ECHO:-false}
      JWT_SECRET: ${JWT_SECRET:?defina JWT_SECRET no .env (>=32 chars aleatorios; nunca o placeholder do repo)}
      RODELCAR_FERNET_KEY: ${RODELCAR_FERNET_KEY:-}
      INTERNAL_TOKEN: ${INTERNAL_TOKEN:-dev-internal-token}
      ENVIRONMENT: ${ENVIRONMENT:-development}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
      RATE_LIMIT_PUBLIC: ${RATE_LIMIT_PUBLIC:-120/minute}
      RATE_LIMIT_AUTH: ${RATE_LIMIT_AUTH:-5/minute}
      RATELIMIT_STORAGE_URI: ${RATELIMIT_STORAGE_URI:-}
      # Em dev, SMTP/WA ficam vazios (não envia). Para exercitar o pipeline
      # localmente sem disparo real, defina NOTIFICACOES_FAKE=true.
      NOTIFICACOES_FAKE: ${NOTIFICACOES_FAKE:-false}
      # E-mail transacional (SMTP). Vazios = não envia. Para Gmail: HOST
      # smtp.gmail.com, PORT 587, USER a conta, PASSWORD a Senha de app (2FA).
      # EMAIL_FROM TEM que ser o mesmo endereço do SMTP_USER (o Gmail recusa
      # enviar de um remetente que não é o autenticado).
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      EMAIL_FROM: ${EMAIL_FROM:-noreply@rodelcar.com.br}
      # YouTube Data API (opcional) — com a chave, o cadastro de vídeo puxa
      # duração, views e likes; sem ela, só título/canal via oEmbed.
      YOUTUBE_API_KEY: ${YOUTUBE_API_KEY:-}
      # Supabase Storage (capas de curso). Bucket público; service_role key só
      # no backend. Sem isso, o upload de imagem fica indisponível (503).
      SUPABASE_URL: ${SUPABASE_URL:-}
      SUPABASE_SERVICE_KEY: ${SUPABASE_SERVICE_KEY:-}
      SUPABASE_BUCKET: ${SUPABASE_BUCKET:-cursos}
      # FONTE ÚNICA do domínio público (back + front). No .env local você define
      # SÓ `NEXT_PUBLIC_SITE_URL`; o backend recebe o mesmo valor como PORTAL_URL,
      # e dele derivam o retorno do Stripe, os links de certificado/e-mail e a
      # renovação. Em deploy separado (Railway), defina PORTAL_URL direto lá.
      PORTAL_URL: ${NEXT_PUBLIC_SITE_URL:-http://localhost:3000}
      RENOVACAO_URL: ${RENOVACAO_URL:-}
      # Pagamentos — Stripe (vazios em dev; defina no .env para rodar o checkout).
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      # Vazios = derivar de PORTAL_URL. Defina só p/ sucesso/cancelamento em outro host.
      STRIPE_SUCCESS_URL: ${STRIPE_SUCCESS_URL:-}
      STRIPE_CANCEL_URL: ${STRIPE_CANCEL_URL:-}
      # Vídeo — Panda Video (REST API). A chave fica SÓ no backend (upload é
      # mediado; nunca vai ao browser). DRM via watermark group, opcional.
      PANDA_API_KEY: ${PANDA_API_KEY:-}
      PANDA_UPLOADER_BASE: ${PANDA_UPLOADER_BASE:-https://uploader-us01.pandavideo.com.br}
      PANDA_FOLDER_ID: ${PANDA_FOLDER_ID:-}
      PANDA_DRM_ENABLED: ${PANDA_DRM_ENABLED:-false}
      PANDA_DRM_GROUP_ID: ${PANDA_DRM_GROUP_ID:-}
      PANDA_DRM_SECRET: ${PANDA_DRM_SECRET:-}
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app

  frontend:
    build: ./frontend
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000/api/v1}
      # SSR dentro do Docker fala com o backend pela rede interna do compose
      # (o NEXT_PUBLIC_* é para o navegador; este é para o servidor do Next).
      API_URL_INTERNAL: ${API_URL_INTERNAL:-http://backend:8000/api/v1}
      # FONTE ÚNICA do domínio público (mesma var que alimenta o PORTAL_URL do back).
      # SEO/sitemap/OG + links de indicação/certificado. Em dev = localhost.
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-http://localhost:3000}
      # Base do embed do Panda (player do LMS). Sem ela, o player cai no placeholder.
      NEXT_PUBLIC_PANDA_EMBED_BASE: ${NEXT_PUBLIC_PANDA_EMBED_BASE:-}
      # Bind mount no Windows/WSL não propaga eventos de inotify → o file-watcher
      # do `next dev` não enxerga edições do host. Polling liga o hot-reload (a
      # custo de um pouco de CPU). Em Linux nativo pode desligar (WATCHPACK_POLLING=false).
      WATCHPACK_POLLING: ${WATCHPACK_POLLING:-true}
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
